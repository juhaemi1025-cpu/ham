<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyAFXOtZyxPJjxWHndlIyA1UXpDVun3zQI0",
  authDomain: "ham-budget-15f3a.firebaseapp.com",
  projectId: "ham-budget-15f3a",
  storageBucket: "ham-budget-15f3a.firebasestorage.app",
  messagingSenderId: "683942567787",
  appId: "1:683942567787:web:472446b212e659527d362e"
});
const db = getFirestore(app);

window._fbSave = async function() {
  try {
    await setDoc(doc(db, 'budget', 'data'), {
      tx: txList || [], sv: savingList || [],
      pu: purposeList || [], fx: fixedList || [],
      as: assetSnapshots || {}, updatedAt: new Date().toISOString()
    });
    console.log('✅ Firebase 저장 완료');
  } catch(e) { console.error('Firebase 저장 실패:', e); }
};

window._fbLoad = async function() {
  try {
    const snap = await getDoc(doc(db, 'budget', 'data'));
    if(snap.exists()) {
      const d = snap.data();
      if(d.tx && d.tx.length > 0) {
        txList = d.tx.map(t => { const dd=new Date(t.date); return {...t, year:dd.getFullYear(), month:dd.getMonth()+1}; });
        localStorage.setItem('tx', JSON.stringify(d.tx));
      }
      if(d.sv) { savingList = d.sv; localStorage.setItem('sv', JSON.stringify(d.sv)); }
      if(d.pu) { purposeList = d.pu; localStorage.setItem('pu', JSON.stringify(d.pu)); }
      if(d.fx) { fixedList = d.fx; localStorage.setItem('fx', JSON.stringify(d.fx)); }
      if(d.as) { assetSnapshots = d.as; localStorage.setItem('as', JSON.stringify(d.as)); }
      renderAll();
      console.log('✅ Firebase 불러오기 완료');
    } else {
      await window._fbSave();
    }
  } catch(e) { console.error('Firebase 오류:', e); }
};

document.addEventListener('DOMContentLoaded', () => {
  setTimeout(() => window._fbLoad(), 800);

function load(){

  const savedVer=localStorage.getItem('dataVersion');
  if(savedVer!==DATA_VERSION){
    // 버전이 다르면 새 DEFAULT 데이터로 강제 교체
    localStorage.clear();
    localStorage.setItem('dataVersion',DATA_VERSION);
  }
  txList=JSON.parse(localStorage.getItem('tx')||'null')||DEFAULT_TX.map(d=>({...d}));
  savingList=JSON.parse(localStorage.getItem('sv')||'null')||DEFAULT_SAVING.map(d=>({...d}));
  purposeList=JSON.parse(localStorage.getItem('pu')||'null')||DEFAULT_PURPOSE.map(d=>({...d}));
  fixedList=JSON.parse(localStorage.getItem('fx')||'null')||DEFAULT_FIXED.map(d=>({...d}));
  // 자산: localStorage에 있으면 사용, 없으면 DEFAULT_ASSET_SNAPSHOTS 객체 그대로 사용
  const savedAs=localStorage.getItem('as');
  if(savedAs){
    assetSnapshots=JSON.parse(savedAs);
  } else {
    // DEFAULT_ASSET_SNAPSHOTS는 이미 {월: {이름: {cat,amt}}} 객체 형태
    if(Array.isArray(DEFAULT_ASSET_SNAPSHOTS)){
      // 혹시 배열이면 변환
      assetSnapshots={};
      DEFAULT_ASSET_SNAPSHOTS.forEach(snap=>{
        const monthKey=snap.date.slice(0,7);
        assetSnapshots[monthKey]={};
        snap.items.forEach(item=>{assetSnapshots[monthKey][item.name]={cat:item.cat,amt:item.amt};});
      });
    } else {
      assetSnapshots=DEFAULT_ASSET_SNAPSHOTS;
    }
  }

  window.fixedList=fixedList;
  window.assetSnapshots=assetSnapshots;
}

function getWeekRange(){
  const now=new Date(),day=now.getDay();
  const mon=new Date(now);mon.setDate(now.getDate()-(day===0?6:day-1));mon.setHours(0,0,0,0);
  const sun=new Date(mon);sun.setDate(mon.getDate()+6);sun.setHours(23,59,59,999);
  return{start:mon,end:sun};
}
function getWeeksInMonth(y,m){
  const weeks=[],last=new Date(y,m,0),cur=new Date(y,m-1,1);
  while(cur<=last){
    const ws=new Date(cur),we=new Date(cur),dow=cur.getDay(),dts=dow===0?0:7-dow;
    we.setDate(cur.getDate()+dts);if(we>last)we.setTime(last.getTime());
    weeks.push({start:new Date(ws),end:new Date(we)});cur.setDate(we.getDate()+1);
  }
  return weeks;
}

}

function renderAsset(){
  const months=Object.keys(assetSnapshots).sort();
  if(!months.length){document.getElementById('asset-body').innerHTML='<div class="empty" style="padding-top:60px">+ 업데이트 버튼으로 자산을 추가하세요!</div>';return;}
  const recent6=months.slice(-6);
  const mTotals=months.map(m=>({month:m,total:Object.values(assetSnapshots[m]).reduce((s,i)=>s+i.amt,0)}));
  const latest=mTotals[mTotals.length-1],prev=mTotals[mTotals.length-2];
  const diff=prev?latest.total-prev.total:null;
  const latestCats={};Object.values(assetSnapshots[latest.month]).forEach(({cat,amt})=>{latestCats[cat]=(latestCats[cat]||0)+amt;});
  const posTotal=Object.values(latestCats).filter(v=>v>0).reduce((s,v)=>s+v,0)||1;
  // 꺾은선 SVG (카테고리별, 대출 제외)
const allCats=[...new Set(recent6.flatMap(m=>Object.values(assetSnapshots[m]).map(i=>i.cat)))].filter(c=>c!=='대출'&&c!=='부동산');
  const catSeries=allCats.map(cat=>({cat,data:recent6.map(m=>Object.values(assetSnapshots[m]||{}).filter(i=>i.cat===cat).reduce((s,i)=>s+i.amt,0))}));
  const allVals=catSeries.flatMap(s=>s.data).filter(v=>v>0);
  const maxV=Math.max(...allVals,1);
  const n=recent6.length,W=370,H=110,pL=4,pT=10,pB=18,cW=W-pL*2,cH=H-pT-pB;
  const xP=i=>pL+(n<=1?cW/2:i/(n-1)*cW);
  const yP=v=>pT+cH-(v/maxV)*cH;
  const svgLines=catSeries.map((s,si)=>{
    const col=ASSET_LINE_COLORS[si%ASSET_LINE_COLORS.length];
    const validPts=s.data.map((v,i)=>({v,i})).filter(p=>p.v>0);
    if(validPts.length===0)return'';
    const pts=s.data.map((v,i)=>`${xP(i).toFixed(1)},${yP(v>0?v:0).toFixed(1)}`).join(' ');
    const dots=s.data.map((v,i)=>v>0?`<circle cx="${xP(i).toFixed(1)}" cy="${yP(v).toFixed(1)}" r="3" fill="${col}" stroke="#fff" stroke-width="1.5"/>`:'').join('');
    return`<polyline points="${pts}" fill="none" stroke="${col}" stroke-width="2" stroke-linejoin="round" stroke-opacity="0.9"/>${dots}`;
  }).join('');
  const xLabels=recent6.map((m,i)=>`<text x="${xP(i).toFixed(1)}" y="${H-2}" text-anchor="middle" font-size="8" fill="#b0a8cc">${m.slice(2).replace('-','/')}</text>`).join('');
  // 총자산 막대 (최근 6개월)
  const r6T=recent6.map(m=>({month:m,total:Object.values(assetSnapshots[m]).reduce((s,i)=>s+i.amt,0)}));
  const maxBar=Math.max(...r6T.map(t=>t.total),1);

  document.getElementById('asset-body').innerHTML=`
  <div class="asset-total fade">
    <div style="font-size:10px;opacity:.6;letter-spacing:1.5px;margin-bottom:4px;font-weight:600">총 자산</div>
    <div style="font-size:28px;font-weight:900;letter-spacing:-1px;color:#fff">${fmtS(latest.total)}</div>
    ${diff!==null?`<div class="asset-diff ${diff>=0?'pos':'neg'}">${diff>=0?'▲':'▼'} 전월 대비 ${fmtS(Math.abs(diff))}</div>`:''}
    <div style="display:flex;gap:6px;margin-top:10px;flex-wrap:wrap">${Object.entries(latestCats).map(([cat,amt])=>`<div style="background:rgba(255,255,255,.15);border-radius:8px;padding:3px 8px;font-size:9px;color:#fff;font-weight:600">${ASSET_CAT_EMOJI[cat]||'💰'} ${cat.replace('_','/')} ${fmtS(amt)}</div>`).join('')}</div>
  </div>
  <div class="card fade">
    <div class="ctitle">📈 카테고리별 꺾은선 추이 <span class="sub">최근 6개월</span></div>
    <div class="chart-wrap">
      <svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="display:block;overflow:visible;max-width:100%">${svgLines}${xLabels}</svg>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:8px">${catSeries.map((s,i)=>`<div style="display:flex;align-items:center;gap:4px;font-size:9px;color:var(--text2)"><div style="width:16px;height:3px;border-radius:2px;background:${ASSET_LINE_COLORS[i%ASSET_LINE_COLORS.length]}"></div>${s.cat.replace('_','/')}</div>`).join('')}</div>
  </div>
  <div class="card fade">
    <div class="ctitle">🏦 총자산 막대 추이 <span class="sub">최근 6개월</span></div>
    ${r6T.map(({month,total},idx)=>{
      const pv=idx>0?r6T[idx-1].total:null,d=pv!==null?total-pv:null;
      const pct=pv&&pv!==0?Math.round((total-pv)/Math.abs(pv)*100):null;
      const barW=Math.round(total/maxBar*100);
      const shortBar=barW<35;
      return`<div style="margin-bottom:10px">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:2px">
          <div style="width:34px;font-size:10px;color:var(--text2);font-weight:600;flex-shrink:0">${month.slice(2).replace('-','/')}</div>
          <div style="flex:1;height:20px;background:var(--gray);border-radius:6px;overflow:visible;position:relative">
            <div style="width:${Math.max(barW,0.5)}%;height:100%;border-radius:6px;background:#7da8e8;position:relative">
              ${!shortBar?`<span style="font-size:9px;font-weight:700;color:#fff;position:absolute;left:7px;top:50%;transform:translateY(-50%);white-space:nowrap">${fmtS(total)}</span>`:''}
            </div>
            ${shortBar?`<span style="font-size:9px;font-weight:700;color:var(--text2);position:absolute;left:calc(${Math.max(barW,0.5)}% + 5px);top:50%;transform:translateY(-50%);white-space:nowrap">${fmtS(total)}</span>`:''}
          </div>
        </div>
        ${d!==null?`<div style="text-align:right;font-size:9px;font-weight:700;color:${d>=0?'#3dbf7a':'#e8637a'};white-space:nowrap;padding-right:2px">${d>=0?'▲':'▼'}${fmtS(Math.abs(d))} ${pct!==null?`(${pct>=0?'+':''}${pct}%)`:''}  </div>`:''}
      </div>`;
    }).join('')}
  </div>
  <div class="card fade">
    <div class="ctitle">📊 현재 자산 구성 <span class="sub">${latest.month.replace('-','년 ')}월</span></div>
    ${Object.entries(latestCats).map(([cat,amt])=>{const pct=Math.round(Math.max(amt,0)/posTotal*100);return assetBarHTML(`${ASSET_CAT_EMOJI[cat]||''} ${cat.replace('_','/')}`,pct,ASSET_CAT_COLOR[cat]||'var(--purple)',fmtS(amt),`${pct}%`);}).join('')}
  </div>
  <div class="card fade">
    <div class="ctitle">🗓️ 월별 자산 내역 <span class="sub">탭하여 펼치기</span></div>
    <div class="asset-timeline">${[...mTotals].reverse().map(({month,total},ri)=>{
      const oi=mTotals.length-1-ri,pT2=oi>0?mTotals[oi-1].total:null,d2=pT2!==null?total-pT2:null;
      const pct2=pT2&&pT2!==0?Math.round((total-pT2)/Math.abs(pT2)*100):null;
      const items=assetSnapshots[month],cg={};
      Object.entries(items).forEach(([name,{cat,amt}])=>{if(!cg[cat])cg[cat]=[];cg[cat].push({name,amt});});
      return`<div class="asset-month-card"><div class="asset-month-hd" onclick="this.nextElementSibling.classList.toggle('open')"><div><div class="asset-month-title">${month.replace('-','년 ')}월</div>${d2!==null?`<div class="asset-month-diff ${d2>=0?'pos':'neg'}">${d2>=0?'▲':'▼'} ${fmtS(Math.abs(d2))} ${pct2!==null?`(${pct2>=0?'+':''}${pct2}%)`:''}</div>`:''}</div><div style="display:flex;align-items:center;gap:6px"><div class="asset-month-total">${fmtS(total)}</div><button onclick="event.stopPropagation();openAssetEditModal('${month}')" style="font-size:10px;padding:3px 7px;background:#e8f0ff;color:var(--blue);border:none;border-radius:7px;cursor:pointer;font-weight:700;font-family:'Noto Sans KR',sans-serif">✏️수정</button><span style="color:var(--text3)">▼</span></div></div><div class="asset-month-body">${Object.entries(cg).map(([cat,its])=>`<div class="asset-sec-title">${ASSET_CAT_EMOJI[cat]||''} ${cat.replace('_','/')}</div>${its.map(({name,amt})=>`<div class="asset-row"><div class="asset-name">${name}</div><div class="asset-val ${amt<0?'neg':amt===0?'neu':'pos'}">${amt<0?'-':'+'}${fmtS(Math.abs(amt))}</div></div>`).join('')}`).join('')}</div></div>`;
    }).join('')}</div>
  </div>`;
}

let cmpTab='monthly'; // monthly / cat / full
let cmpYear=2026;

function renderCompare(){
  // 사용 가능한 년도 목록
  const allYears=[...new Set(txList.map(t=>t.year))].sort();
  if(!allYears.includes(cmpYear))cmpYear=allYears[allYears.length-1];
  const allMonths=[...new Set(txList.filter(t=>t.year===cmpYear).map(t=>`${t.year}-${String(t.month).padStart(2,'0')}`))].sort();
  const recent=allMonths.slice(-6);

  let html=`
  <div style="display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:8px;scrollbar-width:none">
    ${allYears.map(y=>`<button style="flex-shrink:0;padding:5px 12px;border-radius:10px;border:1.5px solid ${cmpYear===y?'var(--purple)':'var(--border)'};background:${cmpYear===y?'var(--purple)':'var(--white)'};color:${cmpYear===y?'#fff':'var(--text2)'};font-size:11px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif" onclick="cmpYear=${y};renderCompare()">${y}년</button>`).join('')}
  </div>
  <div class="cmp-toggle" style="display:flex;border-radius:10px;overflow:hidden;border:1.5px solid var(--border);margin-bottom:10px">
    <button class="cmp-toggle-btn ${cmpTab==='monthly'?'on':''}" onclick="cmpTab='monthly';renderCompare()">📅 월별 수지</button>
    <button class="cmp-toggle-btn ${cmpTab==='cat'?'on':''}" onclick="cmpTab='cat';renderCompare()">📂 카테고리별</button>
    <button class="cmp-toggle-btn ${cmpTab==='full'?'on':''}" onclick="cmpTab='full';renderCompare()">📋 전체비교표</button>
  </div>`;

  if(cmpTab==='monthly'){
    // 월별 수입/지출/저축 + 수입 대비 %
    html+=`<div class="card">`;
    html+=`<div class="ctitle">📅 ${cmpYear}년 월별 수지 현황</div>`;
    if(recent.length===0){html+='<div class="empty">데이터가 없어요</div>';} else {
    recent.forEach(ym=>{
      const[y,m]=ym.split('-').map(Number);
      const inc=txList.filter(t=>t.year===y&&t.month===m&&t.type==='수입').reduce((s,t)=>s+t.amt,0);
      const exp=txList.filter(t=>t.year===y&&t.month===m&&t.type==='지출').reduce((s,t)=>s+t.amt,0);
      const sav=savingList.filter(s=>{const d=new Date(s.date);return d.getFullYear()===y&&d.getMonth()+1===m;}).reduce((s,t)=>s+t.amt,0);
      const expPct=inc>0?Math.round(exp/inc*100):0;
      const savPct=inc>0?Math.round(sav/inc*100):0;
      const mx=Math.max(inc,1);
      html+=`<div style="margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border)">
        <div style="font-size:12px;font-weight:800;margin-bottom:6px;color:var(--text)">${y}년 ${m}월</div>
        <div class="cmpbar" style="margin-bottom:3px"><div class="cmplbl" style="color:var(--mint);width:30px;font-size:9px">💵수입</div><div class="cmptrack" style="height:18px"><div class="cmpfill" style="width:100%;background:#2ea86840;height:100%;min-width:30px"><span class="cmpftxt" style="color:var(--text)">${fmtS(inc)}</span></div></div></div>
        <div class="cmpbar" style="margin-bottom:3px"><div class="cmplbl" style="color:var(--pink);width:30px;font-size:9px">💸지출</div><div class="cmptrack" style="height:18px"><div class="cmpfill" style="width:${Math.max(Math.round(exp/mx*100),3)}%;background:#e0507080;height:100%;min-width:30px"><span class="cmpftxt">${fmtS(exp)}</span></div></div><span style="font-size:9px;font-weight:700;color:var(--pink);margin-left:4px;flex-shrink:0">${expPct}%</span></div>
        <div class="cmpbar"><div class="cmplbl" style="color:var(--purple);width:30px;font-size:9px">💎저축</div><div class="cmptrack" style="height:18px"><div class="cmpfill" style="width:${Math.max(Math.round(sav/mx*100),3)}%;background:#9b7fe880;height:100%;min-width:30px"><span class="cmpftxt">${fmtS(sav)}</span></div></div><span style="font-size:9px;font-weight:700;color:var(--purple);margin-left:4px;flex-shrink:0">${savPct}%</span></div>
      </div>`;
    });}
    html+=`</div>`;
  } else if(cmpTab==='cat'){
    html+=`<div class="cfilter">${[...EXPENSE_CATS,...INCOME_CATS].map(cat=>`<button class="cpill${cat===cmpSelCat?' on':''}" style="${cat===cmpSelCat?`background:${CAT_COLOR[cat]||'var(--purple)'}`:''}" onclick="cmpSelCat='${cat}';renderCompare()">${cat}</button>`).join('')}</div>`;
    const maxA=Math.max(...recent.map(ym=>{const[y,m]=ym.split('-').map(Number);return txList.filter(t=>t.year===y&&t.month===m&&t.cat===cmpSelCat).reduce((s,t)=>s+t.amt,0);}),1);
    html+=`<div class="card"><div class="ctitle">${CAT_EMOJI[cmpSelCat]||''} ${cmpSelCat} 월별 추이</div>`;
    recent.forEach((ym,i)=>{
      const[y,m]=ym.split('-').map(Number),amt=txList.filter(t=>t.year===y&&t.month===m&&t.cat===cmpSelCat).reduce((s,t)=>s+t.amt,0);
      const prev2=i>0?txList.filter(t=>{const[py,pm]=recent[i-1].split('-').map(Number);return t.year===py&&t.month===pm&&t.cat===cmpSelCat;}).reduce((s,t)=>s+t.amt,0):null;
      const df=prev2!==null?amt-prev2:null;
      const barW=Math.max(amt/maxA*100,amt>0?2:0);
      const diffHtml=`<div class="cmpdiff ${df===null?'':df>0?'up':'dn'}">${df===null?'':df>0?'▲'+fmtS(df):'▼'+fmtS(Math.abs(df))}</div>`;
      html+=cmpBarHTML(`${m}월`,barW,CAT_COLOR[cmpSelCat]||'var(--purple)',amt>0?fmtS(amt):'',diffHtml,'');
    });
    html+=`</div>`;
  } else {
    // 전체 비교표 - 전체 지출 합계 포함
    html+=`<div class="card"><div class="ctitle">📊 전체 지출 월별 비교</div>`;
    const expTotals=recent.map(ym=>{const[y,m]=ym.split('-').map(Number);return{ym,y,m,total:txList.filter(t=>t.year===y&&t.month===m&&t.type==='지출').reduce((s,t)=>s+t.amt,0)};});
    const maxExp=Math.max(...expTotals.map(e=>e.total),1);
    expTotals.forEach((e,i)=>{
      const pv=i>0?expTotals[i-1].total:null,df=pv!==null?e.total-pv:null;
      const barW=Math.max(Math.round(e.total/maxExp*100),e.total>0?2:0);
      const diffHtml=`<div class="cmpdiff ${df===null?'':df>0?'up':'dn'}">${df===null?'':df>0?'▲'+fmtS(df):'▼'+fmtS(Math.abs(df))}</div>`;
      html+=cmpBarHTML(`${e.m}월`,barW,'var(--pink)',e.total>0?fmtS(e.total):'',diffHtml,'');
    });
    html+=`</div>`;
    html+=`<div class="card"><div class="ctitle">📋 카테고리별 비교표</div><div class="full-cmp-wrap"><table class="tbl"><tr><th>카테고리</th>${recent.map(ym=>`<th>${parseInt(ym.split('-')[1])}월</th>`).join('')}</tr>`;
    EXPENSE_CATS.forEach(cat=>{
      const amts=recent.map(ym=>{const[y,m]=ym.split('-').map(Number);return txList.filter(t=>t.year===y&&t.month===m&&t.cat===cat).reduce((s,t)=>s+t.amt,0);});
      if(amts.every(a=>a===0))return;
      html+=`<tr><td>${CAT_EMOJI[cat]||''} ${cat}</td>${amts.map((a,i)=>{const pv=amts[i-1],d=pv!==undefined?a-pv:null;return`<td>${a?fmtS(a):'-'}${d!==null&&a&&d?`<br><span class="${d>0?'up':'dn'}">${d>0?'▲':'▼'}${fmtS(Math.abs(d))}</span>`:''}</td>`;}).join('')}</tr>`;
    });
    html+=`<tr><td>합계</td>${recent.map(ym=>{const[y,m]=ym.split('-').map(Number);return`<td>${fmtS(txList.filter(t=>t.year===y&&t.month===m&&t.type==='지출').reduce((s,t)=>s+t.amt,0))}</td>`;}).join('')}</tr></table></div></div>`;
    html+=`<div class="card"><div class="ctitle">💵 수입 비교표</div><div class="full-cmp-wrap"><table class="tbl"><tr><th>카테고리</th>${recent.map(ym=>`<th>${parseInt(ym.split('-')[1])}월</th>`).join('')}</tr>`;
    INCOME_CATS.forEach(cat=>{
      const amts=recent.map(ym=>{const[y,m]=ym.split('-').map(Number);return txList.filter(t=>t.year===y&&t.month===m&&t.cat===cat).reduce((s,t)=>s+t.amt,0);});
      if(amts.every(a=>a===0))return;
      html+=`<tr><td>${CAT_EMOJI[cat]||''} ${cat}</td>${amts.map(a=>`<td>${a?fmtS(a):'-'}</td>`).join('')}</tr>`;
    });
    html+=`<tr><td>합계</td>${recent.map(ym=>{const[y,m]=ym.split('-').map(Number);return`<td>${fmtS(txList.filter(t=>t.year===y&&t.month===m&&t.type==='수입').reduce((s,t)=>s+t.amt,0))}</td>`;}).join('')}</tr></table></div></div>`;
  }
  document.getElementById('compare-body').innerHTML=html;
}

function copyFixedToMonth(){
  const monthVal=document.getElementById('fx-copy-month').value;
  if(!monthVal)return alert('월을 선택해주세요');
  const[y,m]=monthVal.split('-').map(Number);
  let addedExp=0,addedSav=0;
  fixedList.forEach(f=>{
    // 납부일에서 날짜 추출
    const dueStr=f.due||'';
    let dueDay=1;
    const md=dueStr.match(/(\d+)일/);if(md)dueDay=parseInt(md[1]);
    // 월말 보정
    const maxDay=new Date(y,m,0).getDate();
    if(dueDay>maxDay)dueDay=maxDay;
    const dateStr=`${y}-${String(m).padStart(2,'0')}-${String(dueDay).padStart(2,'0')}`;
    if(f.cat==='저축'){
      const isDup=savingList.some(s=>s.date===dateStr&&s.name===f.name&&s.amt===f.amt);
      if(!isDup){savingList.push({id:uid(),date:dateStr,name:f.name,cat:'기타저축',amt:f.amt,memo:'고정비 자동추가'});addedSav++;}
    } else {
      const isDup=txList.some(t=>t.date===dateStr&&t.name===f.name&&t.amt===f.amt&&t.cat==='고정 지출');
      if(!isDup){
        const d=new Date(dateStr);
        txList.push({id:uid(),date:dateStr,name:f.name,cat:'고정 지출',amt:f.amt,card:f.bank||'',type:'지출',year:d.getFullYear(),month:d.getMonth()+1});
        addedExp++;
      }
    }
  });
  save();renderAll();
  // 토스트 메시지
  const toast=document.createElement('div');
  toast.style.cssText='position:fixed;top:60px;left:50%;transform:translateX(-50%);background:#3d3554;color:#fff;padding:10px 20px;border-radius:12px;font-size:12px;font-weight:700;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.2);font-family:Noto Sans KR,sans-serif';
  toast.textContent=`✅ 추가 완료! 지출 ${addedExp}건, 저축 ${addedSav}건 (중복 ${fixedList.length-addedExp-addedSav}건 제외)`;
  document.body.appendChild(toast);
  setTimeout(()=>toast.remove(),3000);
}

let purposeYear=new Date().getFullYear();

function renderPurpose(){
  // 전체 거래 목록 (날짜순)
  const allEntries=[
    ...savingList.filter(s=>s.cat==='목적 통장').map(s=>({...s,type:'저축',memo:s.memo||'',srcType:'saving'})),
    ...purposeList.map(p=>({...p,srcType:'purpose'}))
  ].sort((a,b)=>a.date.localeCompare(b.date));

  // 연도 목록
  const allYears=[...new Set(allEntries.map(e=>new Date(e.date).getFullYear()))].sort();
  if(!allYears.includes(purposeYear)&&allYears.length>0)purposeYear=allYears[allYears.length-1];

  // 이전 연도 말 잔액 계산 (이월)
  const prevYearEntries=allEntries.filter(e=>new Date(e.date).getFullYear()<purposeYear);
  let carryBalance=prevYearEntries.reduce((s,e)=>e.type==='저축'?s+e.amt:s-e.amt,0);

  // 이번 연도 거래
  const yearEntries=allEntries.filter(e=>new Date(e.date).getFullYear()===purposeYear);
  let run=carryBalance;
  const entries=yearEntries.map(e=>{if(e.type==='저축')run+=e.amt;else run-=e.amt;return{...e,bal:run};});

  // 전체 잔액
  const totalBal=allEntries.reduce((s,e)=>e.type==='저축'?s+e.amt:s-e.amt,0);
  const yearIn=yearEntries.filter(e=>e.type==='저축').reduce((s,e)=>s+e.amt,0);
  const yearOut=yearEntries.filter(e=>e.type==='지출').reduce((s,e)=>s+e.amt,0);

  document.getElementById('purpose-body').innerHTML=`
  <div class="purpose-hero fade"><div class="pu-bal-lbl">전체 잔액</div><div class="pu-bal">${fmtS(totalBal)}</div>
    <div class="pu-chips">
      <div class="pu-chip">${purposeYear}년 입금 ${fmtS(yearIn)}</div>
      <div class="pu-chip">${purposeYear}년 출금 ${fmtS(yearOut)}</div>
      ${carryBalance>0?`<div class="pu-chip">이월 ${fmtS(carryBalance)}</div>`:''}
    </div>
  </div>
  <div style="display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:8px;scrollbar-width:none">
    ${allYears.map(y=>`<button style="flex-shrink:0;padding:5px 12px;border-radius:10px;border:1.5px solid ${purposeYear===y?'var(--purple)':'var(--border)'};background:${purposeYear===y?'var(--purple)':'var(--white)'};color:${purposeYear===y?'#fff':'var(--text2)'};font-size:11px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif" onclick="purposeYear=${y};renderPurpose()">${y}년</button>`).join('')}
  </div>
  <div class="card fade"><div class="ctitle">📋 ${purposeYear}년 거래 내역 <span class="sub">이월 ${fmtS(carryBalance)}</span></div>
  ${entries.length===0?'<div class="empty">이 해의 거래 내역이 없어요</div>':[...entries].reverse().map(e=>{
    const editBtn=e.srcType==='purpose'
      ?`<button class="ledit" onclick="editPurpose('${e.id}')">✏️</button>`
      :`<button class="ledit" onclick="editPurposeSaving('${e.id}')">✏️</button>`;
    return`<div class="pu-item"><div class="pu-icon ${e.type==='저축'?'in':'out'}">${e.type==='저축'?'💰':'💸'}</div><div class="pu-info"><div class="pu-name">${e.name}${e.memo?' ('+e.memo+')':''}</div><div class="pu-date">${e.date}</div></div><div class="pu-right"><div class="pu-amt ${e.type==='저축'?'in':'out'}">${e.type==='저축'?'+':'-'}${fmtS(e.amt)}</div><div class="pu-balance">잔액 ${fmtS(e.bal)}</div></div><div class="lbtns">${editBtn}<button class="ldel" onclick="${e.srcType==='purpose'?'delPurpose':'delPurposeSaving'}('${e.id}')">🗑</button></div></div>`;
  }).join('')}
  </div>`;
}

function openFixedModal(id){
  document.getElementById('fx-edit-id').value=id||'';
  if(id){const f=fixedList.find(f=>f.id===id);if(!f)return;document.getElementById('fx-name').value=f.name;document.getElementById('fx-amt').value=fmtNum(String(f.amt));document.getElementById('fx-cat').value=f.cat;document.getElementById('fx-bank').value=f.bank||'';document.getElementById('fx-due').value=f.due||'';}
  else{['fx-name','fx-bank','fx-due'].forEach(i=>document.getElementById(i).value='');document.getElementById('fx-amt').value='';}
  document.getElementById('modal-fixed').classList.add('on');
}
function closeFixedModal(){document.getElementById('modal-fixed').classList.remove('on');}
function saveFixed(){
  const id=document.getElementById('fx-edit-id').value,name=document.getElementById('fx-name').value.trim(),amt=parseFmt(document.getElementById('fx-amt').value),cat=document.getElementById('fx-cat').value,bank=document.getElementById('fx-bank').value.trim(),due=document.getElementById('fx-due').value.trim();
  if(!name||!amt)return alert('항목명과 금액을 입력해주세요');
  const obj={id:id||uid(),name,amt,cat,bank,due};
  if(id)fixedList=fixedList.map(f=>f.id===id?obj:f);else fixedList.push(obj);
  save();closeFixedModal();renderFixed();
}
function editFixed(id){openFixedModal(id);}
function delFixed(id){if(!confirm('삭제할까요?'))return;fixedList=fixedList.filter(f=>f.id!==id);save();renderFixed();}

function openAssetEditModal(month){
  document.getElementById('as-month').value=month;
  assetModalItems={};
  refreshAssetModal();
  document.getElementById('modal-asset').classList.add('on');
}
function openAssetModal(){
  const now=new Date(),thisMonth=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  document.getElementById('as-month').value=thisMonth;
  document.getElementById('as-new-name').value='';document.getElementById('as-new-amt').value='';
  assetModalItems={};
  refreshAssetModal();
  document.getElementById('modal-asset').classList.add('on');
}
function refreshAssetModal(){
  const month=document.getElementById('as-month').value;
  const months=Object.keys(assetSnapshots).sort(),prevM=months.filter(m=>m<month).pop();
  const lastData=prevM?assetSnapshots[prevM]:{},curData=assetSnapshots[month]||{};
  const allNames=[...new Set([...Object.keys(lastData),...Object.keys(curData)])];
  // 기존 항목 유지하고 새 항목 병합
  const newItems={};
  allNames.forEach(name=>{
    const prev=lastData[name],cur=curData[name];
    newItems[name]={cat:cur?.cat||prev?.cat||'현금',amt:assetModalItems[name]?.amt??cur?.amt??prev?.amt??0,prevAmt:prev?.amt??null};
  });
  // 직접 추가한 항목 유지
  Object.keys(assetModalItems).forEach(name=>{if(!newItems[name])newItems[name]=assetModalItems[name];});
  assetModalItems=newItems;
  renderAssetInputList();
}
function renderAssetInputList(){
  const catG={};
  Object.entries(assetModalItems).forEach(([name,{cat,amt,prevAmt}])=>{if(!catG[cat])catG[cat]=[];catG[cat].push({name,amt,prevAmt});});
  let html='';
  Object.entries(catG).forEach(([cat,items])=>{
    html+=`<div style="font-size:10px;font-weight:700;color:var(--text3);letter-spacing:1px;padding:8px 0 4px">${ASSET_CAT_EMOJI[cat]||''} ${cat.replace('_','/')}</div>`;
    items.forEach(({name,amt,prevAmt})=>{
      html+=`<div class="asset-input-row"><div class="asset-input-lbl">${name}<br><span class="asset-input-sub">전월: ${prevAmt!==null?prevAmt.toLocaleString()+'원':'없음'}</span></div><input class="asset-input-field" type="number" value="${amt}" data-name="${name}" oninput="assetModalItems[this.dataset.name].amt=parseInt(this.value)||0"></div>`;
    });
  });
  document.getElementById('asset-input-list').innerHTML=html||'<div class="empty">항목이 없어요</div>';
}
function addAssetItem(){
  const name=document.getElementById('as-new-name').value.trim(),cat=document.getElementById('as-new-cat').value,amt=parseFmt(document.getElementById('as-new-amt').value);
  if(!name)return alert('자산명을 입력해주세요');
  assetModalItems[name]={cat,amt,prevAmt:null};
  document.getElementById('as-new-name').value='';document.getElementById('as-new-amt').value='';
  renderAssetInputList();
}
function closeAssetModal(){document.getElementById('modal-asset').classList.remove('on');}
function saveAsset(){
  const month=document.getElementById('as-month').value;if(!month)return alert('월을 선택해주세요');
  assetSnapshots[month]={};
  Object.entries(assetModalItems).forEach(([name,{cat,amt}])=>{assetSnapshots[month][name]={cat,amt};});
  save();closeAssetModal();renderAsset();
}

document.querySelectorAll('.modal-bg').forEach(bg=>{bg.addEventListener('click',e=>{if(e.target===bg)bg.classList.remove('on');});});
load();
const _n=new Date();curYear=_n.getFullYear();curMonth=_n.getMonth()+1;
renderHome();
</script>
